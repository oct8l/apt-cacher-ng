services:
  apt-cacher-ng:
    image: ${TEST_IMAGE:-ghcr.io/oct8l/apt-cacher-ng:latest}
    platform: ${TEST_PLATFORM:-linux/amd64}
    init: true
    ports:
      - "3142:3142"
    volumes:
      - apt-cacher-data:/var/cache/apt-cacher-ng
      - apt-cacher-logs:/var/log/apt-cacher-ng
    healthcheck:
      test: ["CMD", "wget", "-q", "-t1", "-O", "/dev/null", "http://localhost:3142/acng-report.html"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  test-client:
    image: debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818
    depends_on:
      apt-cacher-ng:
        condition: service_healthy
    volumes:
      - ./tests:/tests
    command: sleep infinity

volumes:
  apt-cacher-data:
  apt-cacher-logs:
