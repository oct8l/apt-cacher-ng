services:
  apt-cacher-ng:
    image: ${TEST_IMAGE:-ghcr.io/oct8l/apt-cacher-ng:latest}
    init: true
    ports:
      - "3142:3142"
    volumes:
      - apt-cacher-data:/var/cache/apt-cacher-ng
      - apt-cacher-logs:/var/log/apt-cacher-ng
    healthcheck:
      test: ["CMD", "wget", "-q", "-t1", "-O", "/dev/null", "http://localhost:3142/acng-report.html"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Client images for multi-distribution tests
  debian-trixie-slim:
    <<: &client
      depends_on:
        apt-cacher-ng:
          condition: service_healthy
      volumes:
        - ./tests:/tests
      command: sleep infinity
    image: debian:trixie-slim

  debian-trixie:
    <<: *client
    image: debian:trixie

  debian-bookworm-slim:
    <<: *client
    image: debian:bookworm-slim

  debian-bookworm:
    <<: *client
    image: debian:bookworm

  debian-bullseye-slim:
    <<: *client
    image: debian:bullseye-slim

  debian-bullseye:
    <<: *client
    image: debian:bullseye

  ubuntu-26-04:
    <<: *client
    image: ubuntu:26.04

  ubuntu-24-04:
    <<: *client
    image: ubuntu:24.04

  ubuntu-22-04:
    <<: *client
    image: ubuntu:22.04

volumes:
  apt-cacher-data:
  apt-cacher-logs:
