services:
  apt-cacher-ng:
    image: ${TEST_IMAGE:-ghcr.io/oct8l/apt-cacher-ng:latest}
    init: true
    ports:
      - "3142:3142"
    volumes:
      - apt-cacher-data:/var/cache/apt-cacher-ng
      - apt-cacher-logs:/var/log/apt-cacher-ng
    healthcheck:
      test: ["CMD", "wget", "-q", "-t1", "-O", "/dev/null", "http://localhost:3142/acng-report.html"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Test multiple distributions
  debian-bookworm:
    image: debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818
    depends_on:
      apt-cacher-ng:
        condition: service_healthy
    volumes:
      - ./tests:/tests
    command: sleep infinity

  debian-bullseye:
    image: debian:bullseye-slim@sha256:cba95a21c96c1f5fc2470081829363eed57706634f7dc26e8c6712934303d57a
    depends_on:
      apt-cacher-ng:
        condition: service_healthy
    volumes:
      - ./tests:/tests
    command: sleep infinity

  ubuntu-jammy:
    image: ubuntu:22.04@sha256:0e0a0fc6d18feda9db1590da249ac93e8d5abfea8f4c3c0c849ce512b5ef8982
    depends_on:
      apt-cacher-ng:
        condition: service_healthy
    volumes:
      - ./tests:/tests
    command: sleep infinity

volumes:
  apt-cacher-data:
  apt-cacher-logs:
