name: ShellCheck

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  shellcheck:
    name: Lint bash scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          # Find and lint all shell scripts
          find . -name "*.sh" -not -path "*/\.*" -print0 | xargs -0 shellcheck
